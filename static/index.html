<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SongDrop 🎵</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0EEFF;
      --ink: #1E1B4B;
      --card: #ffffff;
      --accent: #7C3AED;
      --accent2: #0EA5E9;
      --spotify: #1DB954;
      --muted: #7C7A9E;
      --border: #DDD6FE;
      --radius: 6px;
      --shadow: 4px 4px 0px var(--ink);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      opacity: 0.5;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.25s ease;
    }

    .screen.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card);
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 15px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(4.5rem, 14vw, 7rem);
      font-weight: 800;
      line-height: 0.9;
      margin-bottom: 12px;
    }

    h2 { font-size: 2rem; font-weight: 800; margin-bottom: 20px; }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      background: var(--bg);
      color: var(--ink);
      margin-bottom: 18px;
      outline: none;
      transition: box-shadow 0.15s;
    }

    input:focus, select:focus { box-shadow: 3px 3px 0 var(--accent); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 24px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
      width: 100%;
      text-decoration: none;
      border: 2px solid var(--ink);
    }

    .btn:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--ink); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: var(--shadow); }

    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-dark     { background: var(--ink); color: #fff; }
    .btn-ghost    { background: transparent; color: var(--ink); }
    .btn-green    { background: var(--accent2); color: #fff; }
    .btn-spotify  { background: var(--spotify); color: #fff; border-color: var(--spotify); }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--bg);
      margin-bottom: 20px;
      font-size: 13px;
    }

    .user-bar .name { font-weight: 700; }
    .user-bar .logout {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
    }
    .user-bar .logout:hover { color: var(--accent); }

    /* SDK status */
    .sdk-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--bg);
      margin-bottom: 18px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--muted);
    }

    .sdk-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .sdk-dot.ready { background: var(--spotify); }
    .sdk-dot.error { background: var(--accent); }

    /* Album art */
    .art-wrap {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: var(--ink);
      margin-bottom: 20px;
    }

    .art-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .art-blur {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(48px);
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      transition: opacity 0.6s;
    }

    .art-blur.gone { opacity: 0; pointer-events: none; }

    /* Player */
    .player-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      background: var(--accent);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 0 var(--ink);
      flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .play-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
    .play-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-wrap {
      flex: 1; height: 8px;
      background: var(--border);
      border: 2px solid var(--ink);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }

    .timer-label {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 28px;
      text-align: right;
    }

    /* Answer */
    .answer-wrap {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
      transition: background 0.3s;
    }

    .answer-wrap.hidden {
      background: var(--border);
      border-style: dashed;
    }

    .answer-wrap.hidden .song-title,
    .answer-wrap.hidden .song-artist { color: var(--border); user-select: none; }

    .answer-wrap.revealed { background: var(--ink); color: #fff; }
    .answer-wrap.revealed .song-artist { color: #888; }

    .song-title  { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
    .song-artist { font-family: 'Space Mono', monospace; font-size: 14px; }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 8px;
    }

    .round-badge {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      padding: 4px 12px;
      border: 2px solid var(--ink);
      border-radius: 99px;
      background: var(--bg);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .score-pill {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      padding: 4px 12px;
      border: 2px solid var(--ink);
      border-radius: 99px;
      background: var(--ink);
      color: #fff;
    }

    .score-pill span { color: var(--accent); font-weight: 800; }

    /* Multiplayer score pills */
    .scores-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .player-score-pill {
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      padding: 4px 12px;
      border: 2px solid var(--ink);
      border-radius: 99px;
      background: var(--ink);
      color: #fff;
      white-space: nowrap;
    }

    .player-score-pill span { color: var(--accent); font-weight: 800; }
    .player-score-pill.leader { background: var(--accent); border-color: var(--accent); }
    .player-score-pill.leader span { color: #fff; }

    /* Player chips in setup */
    .players-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      min-height: 20px;
    }

    .player-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border: 2px solid var(--ink);
      border-radius: 99px;
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      background: var(--bg);
    }

    .player-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      padding: 0;
      line-height: 1;
    }

    .player-chip button:hover { color: var(--accent); }

    .player-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .player-add-row input {
      margin-bottom: 0;
      flex: 1;
    }

    .player-add-row .btn {
      width: auto;
      padding: 11px 16px;
      flex-shrink: 0;
      box-shadow: 3px 3px 0 var(--ink);
    }

    /* Results */
    .result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-row:last-child { border-bottom: none; }
    .result-name { font-weight: 700; font-size: 17px; }
    .result-artist { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--muted); }

    .error-msg {
      display: none;
      background: #F5F3FF;
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .loading-bar {
      width: 100%; height: 3px;
      background: var(--border);
      margin-bottom: 20px;
      overflow: hidden;
      border-radius: 99px;
    }

    .loading-bar::after {
      content: '';
      display: block;
      width: 40%; height: 100%;
      background: var(--accent);
      animation: slide 1s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .divider { height: 2px; background: var(--border); margin: 20px 0; }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .btn-row  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="screen active" id="screen-login">
    <div class="card">
      <p class="logo">SongDrop</p>
      <h1>Name<br>That<br>Track.</h1>
      <p class="subtitle">// paste a playlist. guess the song.</p>
      <a class="btn btn-spotify" href="/login">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        Login with Spotify
      </a>
    </div>
  </div>

  <!-- SETUP -->
  <div class="screen" id="screen-setup">
    <div class="card">
      <p class="logo">SongDrop</p>
      <div class="user-bar">
        <span>👋 Hey, <span class="name" id="user-name">...</span></span>
        <span class="logout" id="btn-logout">Log out</span>
      </div>

      <div class="sdk-status">
        <div class="sdk-dot" id="sdk-dot"></div>
        <span id="sdk-status-text">Connecting to Spotify player...</span>
      </div>

      <div class="error-msg" id="setup-error"></div>

      <label>Spotify Playlist URL</label>
      <input id="input-playlist" type="text" placeholder="https://open.spotify.com/playlist/..." />

      <div class="form-row">
        <div>
          <label>Rounds</label>
          <select id="input-rounds">
            <option value="10" selected>10 rounds</option>
            <option value="20">20 rounds</option>
            <option value="30">30 rounds</option>
          </select>
        </div>
        <div>
          <label>Clip Duration</label>
          <select id="input-duration">
            <option value="10" selected>10 seconds</option>
            <option value="20">20 seconds</option>
            <option value="30">30 seconds</option>
            <option value="45">45 seconds</option>
          </select>
        </div>
      </div>

      <label>Clip Mode</label>
      <select id="input-mode">
        <option value="beginning">From the beginning</option>
        <option value="random">Random snippet</option>
      </select>

      <label>Players <span style="font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0;">(optional — for multiplayer)</span></label>
      <div class="players-chips" id="players-list"></div>
      <div class="player-add-row">
        <input id="input-player-name" type="text" placeholder="Player name..." />
        <button class="btn btn-dark" id="btn-add-player">+ Add</button>
      </div>

      <button class="btn btn-primary" id="btn-load" disabled>Load Playlist →</button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div class="card">
      <p class="logo">SongDrop</p>
      <p style="font-size:13px;font-family:'Space Mono',monospace;color:var(--muted);margin-bottom:20px;">Fetching tracks...</p>
      <div class="loading-bar"></div>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <div class="card">
      <div class="game-header">
        <div class="round-badge" id="round-badge">Round 1 / 10</div>
        <div class="scores-row" id="scores-display">
          <div class="player-score-pill">Score <span id="score-display">0</span></div>
        </div>
      </div>

      <div class="art-wrap">
        <img id="album-art" src="" alt="" />
        <div class="art-blur" id="art-blur">🎵</div>
      </div>

      <div class="player-row">
        <button class="play-btn" id="play-btn" disabled>▶</button>
        <div class="progress-wrap">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="timer-label" id="timer-label">0s</span>
      </div>

      <div class="answer-wrap hidden" id="answer-wrap">
        <div class="song-title" id="answer-title">Song Title</div>
        <div class="song-artist" id="answer-artist">Artist</div>
      </div>

      <div id="controls-hidden">
        <button class="btn btn-primary" id="btn-reveal">👁 Reveal</button>
      </div>

      <div id="controls-revealed" style="display:none">
        <div id="player-btns" class="btn-row"></div>
      </div>
    </div>
  </div>

  <!-- SCOREBOARD -->
  <div class="screen" id="screen-scoreboard">
    <div class="card">
      <p class="logo">Game Over</p>
      <h2>Final Score 🏆</h2>
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:4rem;font-weight:800;color:var(--accent);" id="final-pts"></div>
        <div style="font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);margin-top:4px;" id="final-sub"></div>
      </div>
      <div class="divider"></div>
      <div id="final-track-list" style="margin-bottom:20px;"></div>
      <button class="btn btn-primary" id="btn-restart">Play Again →</button>
    </div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    let sessionId = null;
    let accessToken = null;
    let deviceId = null;
    let player = null;
    let playerReady = false;

    let allTracks = [];
    let gameTracks = [];
    let currentRound = 0;
    let totalRounds = 10;
    let score = 0;
    let clipDuration = 5;
    let clipMode = 'beginning';
    let clipTimer = null;
    let isRevealed = false;
    let isPlaying = false;
    let roundResults = [];
    let players = []; // [{name, score}]

    // ── Spotify SDK callback ──────────────────────────────────────────────────
    window.onSpotifyWebPlaybackSDKReady = () => {
      if (!accessToken) return;
      initPlayer();
    };

    function initPlayer() {
      player = new Spotify.Player({
        name: 'SongDrop',
        getOAuthToken: cb => cb(accessToken),
        volume: 0.8,
      });

      player.addListener('ready', ({ device_id }) => {
        deviceId = device_id;
        playerReady = true;
        setSDKStatus('ready', '🎵 Player ready');
        document.getElementById('btn-load').disabled = false;
        document.getElementById('play-btn').disabled = false;
      });

      player.addListener('not_ready', () => {
        playerReady = false;
        setSDKStatus('error', 'Player disconnected');
      });

      player.addListener('initialization_error', ({ message }) => {
        setSDKStatus('error', 'Init error: ' + message);
      });

      player.addListener('authentication_error', ({ message }) => {
        setSDKStatus('error', 'Auth error — try logging out and back in');
      });

      player.addListener('account_error', () => {
        setSDKStatus('error', 'Spotify Premium required for playback');
      });

      player.connect();
    }

    function setSDKStatus(state, text) {
      const dot = document.getElementById('sdk-dot');
      const label = document.getElementById('sdk-status-text');
      dot.className = 'sdk-dot ' + state;
      label.textContent = text;
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const sid = params.get('session');

      if (sid) {
        window.history.replaceState({}, '', '/');
        sessionId = sid;
        localStorage.setItem('session_id', sid);
      } else {
        sessionId = localStorage.getItem('session_id');
      }

      if (sessionId) {
        await loadUser();
      } else {
        showScreen('login');
      }
    }

    async function loadUser() {
      try {
        const res = await fetch(`/me?session_id=${sessionId}`);
        if (!res.ok) throw new Error('Session expired');
        const data = await res.json();
        document.getElementById('user-name').textContent = data.name;
        accessToken = data.access_token;
        showScreen('setup');

        if (window.Spotify) {
          initPlayer();
        }
      } catch {
        localStorage.removeItem('session_id');
        sessionId = null;
        showScreen('login');
      }
    }

    // ── Screens ───────────────────────────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    // ── Logout ────────────────────────────────────────────────────────────────
    document.getElementById('btn-logout').addEventListener('click', () => {
      if (player) player.disconnect();
      localStorage.removeItem('session_id');
      sessionId = null;
      playerReady = false;
      showScreen('login');
    });

    // ── Players setup ─────────────────────────────────────────────────────────
    function renderPlayerChips() {
      document.getElementById('players-list').innerHTML = players.map((p, i) => `
        <span class="player-chip">
          ${p.name}
          <button onclick="removePlayer(${i})" title="Remove">×</button>
        </span>
      `).join('');
    }

    function addPlayer() {
      const input = document.getElementById('input-player-name');
      const name = input.value.trim();
      if (!name || players.find(p => p.name === name)) return;
      players.push({ name, score: 0 });
      input.value = '';
      renderPlayerChips();
    }

    function removePlayer(i) {
      players.splice(i, 1);
      renderPlayerChips();
    }

    document.getElementById('btn-add-player').addEventListener('click', addPlayer);
    document.getElementById('input-player-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') addPlayer();
    });

    // ── Load playlist ─────────────────────────────────────────────────────────
    document.getElementById('btn-load').addEventListener('click', async () => {
      const url = document.getElementById('input-playlist').value.trim();
      if (!url) return showError('setup-error', 'Please paste a Spotify playlist URL.');

      totalRounds = parseInt(document.getElementById('input-rounds').value);
      clipDuration = parseInt(document.getElementById('input-duration').value);
      clipMode = document.getElementById('input-mode').value;

      showScreen('loading');

      try {
        const res = await fetch(`/playlist?url=${encodeURIComponent(url)}&session_id=${sessionId}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to load playlist.');
        allTracks = data.tracks;
        startGame();
      } catch (err) {
        showScreen('setup');
        showError('setup-error', err.message);
      }
    });

    // ── Game ──────────────────────────────────────────────────────────────────
    function startGame() {
      gameTracks = shuffle([...allTracks]).slice(0, totalRounds);
      totalRounds = gameTracks.length;
      currentRound = 0;
      score = 0;
      roundResults = [];
      players.forEach(p => p.score = 0);
      showScreen('game');
      loadRound();
    }

    function loadRound() {
      isRevealed = false;
      isPlaying = false;
      clearInterval(clipTimer);
      if (player && playerReady) player.pause().catch(() => {});

      const track = gameTracks[currentRound];

      document.getElementById('round-badge').textContent = `Round ${currentRound + 1} / ${totalRounds}`;
      document.getElementById('answer-title').textContent = '';
      document.getElementById('answer-artist').textContent = '';

      // Set album art now (it's hidden behind the blur)
      document.getElementById('album-art').src = track.album_art || '';

      // Reset blur instantly — no transition — to avoid flash of revealed art
      const blur = document.getElementById('art-blur');
      blur.style.transition = 'none';
      blur.style.opacity = '1';
      blur.classList.remove('gone');
      requestAnimationFrame(() => {
        blur.style.transition = '';
        blur.style.opacity = '';
      });

      const wrap = document.getElementById('answer-wrap');
      wrap.style.transition = 'none';
      wrap.classList.add('hidden');
      wrap.classList.remove('revealed');
      requestAnimationFrame(() => wrap.style.transition = '');

      document.getElementById('controls-hidden').style.display = 'block';
      document.getElementById('controls-revealed').style.display = 'none';

      document.getElementById('play-btn').textContent = '▶';
      document.getElementById('progress-fill').style.width = '0%';
      document.getElementById('timer-label').textContent = '0s';

      updateScoreDisplay();
    }

    function updateScoreDisplay() {
      const container = document.getElementById('scores-display');
      if (players.length === 0) {
        container.innerHTML = `<div class="player-score-pill">Score <span>${score}</span></div>`;
      } else {
        const maxScore = Math.max(...players.map(p => p.score));
        container.innerHTML = players.map(p => `
          <div class="player-score-pill ${p.score > 0 && p.score === maxScore ? 'leader' : ''}">
            ${p.name} <span>${p.score}</span>
          </div>
        `).join('');
      }
    }

    // ── Playback ──────────────────────────────────────────────────────────────
    document.getElementById('play-btn').addEventListener('click', async () => {
      if (!playerReady) return showError('setup-error', 'Player not ready yet.');

      if (isPlaying) {
        await player.pause();
        isPlaying = false;
        document.getElementById('play-btn').textContent = '▶';
        clearInterval(clipTimer);
        return;
      }

      const track = gameTracks[currentRound];
      const uri = track.uri;

      let positionMs = 0;
      if (clipMode === 'random') {
        const durationMs = track.duration_ms;
        const maxStart = Math.max(0, durationMs - (clipDuration * 1000) - 2000);
        positionMs = Math.floor(Math.random() * maxStart);
      }

      try {
        await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            uris: [uri],
            position_ms: positionMs,
          }),
        });

        isPlaying = true;
        document.getElementById('play-btn').textContent = '⏸';
        startClipTimer(positionMs);
      } catch (err) {
        showError('setup-error', 'Playback error: ' + err.message);
      }
    });

    function startClipTimer(startMs) {
      clearInterval(clipTimer);
      const startTime = Date.now();

      clipTimer = setInterval(async () => {
        const elapsed = Date.now() - startTime;
        const pct = Math.min((elapsed / (clipDuration * 1000)) * 100, 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('timer-label').textContent = Math.min(Math.floor(elapsed / 1000), clipDuration) + 's';

        if (elapsed >= clipDuration * 1000) {
          clearInterval(clipTimer);
          await player.pause();
          isPlaying = false;
          document.getElementById('play-btn').textContent = '▶';
          document.getElementById('progress-fill').style.width = '100%';
        }
      }, 100);
    }

    // ── Reveal ────────────────────────────────────────────────────────────────
    document.getElementById('btn-reveal').addEventListener('click', reveal);

    async function reveal() {
      if (isRevealed) return;
      isRevealed = true;
      clearInterval(clipTimer);
      if (isPlaying) {
        await player.pause();
        isPlaying = false;
      }

      document.getElementById('art-blur').classList.add('gone');

      const track = gameTracks[currentRound];
      document.getElementById('answer-title').textContent = track.name;
      document.getElementById('answer-artist').textContent = track.artist;

      const wrap = document.getElementById('answer-wrap');
      wrap.classList.remove('hidden');
      wrap.classList.add('revealed');

      document.getElementById('controls-hidden').style.display = 'none';

      // Build scoring buttons
      const btnContainer = document.getElementById('player-btns');
      if (players.length === 0) {
        // Single player mode
        btnContainer.style.gridTemplateColumns = '1fr 1fr';
        btnContainer.innerHTML = `
          <button class="btn btn-green" id="btn-correct">✓ Got it! +1</button>
          <button class="btn btn-ghost" id="btn-wrong">✗ Nope</button>
        `;
        document.getElementById('btn-correct').addEventListener('click', () => {
          score++;
          roundResults.push({ ...gameTracks[currentRound], got_it: true, scorer: null });
          nextRound();
        });
        document.getElementById('btn-wrong').addEventListener('click', () => {
          roundResults.push({ ...gameTracks[currentRound], got_it: false, scorer: null });
          nextRound();
        });
      } else {
        // Multiplayer mode — one button per player + nobody
        const cols = Math.min(players.length + 1, 3);
        btnContainer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        btnContainer.innerHTML = players.map((p, i) => `
          <button class="btn btn-green" data-idx="${i}">${p.name} +1</button>
        `).join('') + `<button class="btn btn-ghost" data-idx="-1">Nobody</button>`;

        btnContainer.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.idx);
            if (idx >= 0) {
              players[idx].score++;
              roundResults.push({ ...gameTracks[currentRound], got_it: true, scorer: players[idx].name });
            } else {
              roundResults.push({ ...gameTracks[currentRound], got_it: false, scorer: null });
            }
            updateScoreDisplay();
            nextRound();
          });
        });
      }

      document.getElementById('controls-revealed').style.display = 'block';
    }

    // ── Next round ────────────────────────────────────────────────────────────
    function nextRound() {
      currentRound++;
      currentRound >= totalRounds ? endGame() : loadRound();
    }

    // ── End ───────────────────────────────────────────────────────────────────
    function endGame() {
      showScreen('scoreboard');

      if (players.length === 0) {
        document.getElementById('final-pts').textContent = `${score} / ${totalRounds}`;
        document.getElementById('final-sub').textContent =
          score === totalRounds ? '🔥 Perfect score!' :
          score >= totalRounds * 0.7 ? '🎉 Great round!' :
          score >= totalRounds * 0.4 ? '👍 Not bad!' : '😅 Keep practicing!';

        document.getElementById('final-track-list').innerHTML = roundResults.map(r => `
          <div class="result-row">
            <span style="font-size:1.1rem">${r.got_it ? '✅' : '❌'}</span>
            <div>
              <div class="result-name">${r.name}</div>
              <div class="result-artist">${r.artist}</div>
            </div>
          </div>
        `).join('');
      } else {
        const sorted = [...players].sort((a, b) => b.score - a.score);
        const winner = sorted[0];
        document.getElementById('final-pts').textContent = winner.name;
        document.getElementById('final-sub').textContent =
          `🏆 Winner with ${winner.score} point${winner.score !== 1 ? 's' : ''}!`;

        const medals = ['🥇', '🥈', '🥉'];
        const playerRows = sorted.map((p, i) => `
          <div class="result-row">
            <span style="font-size:1.1rem">${medals[i] || ''}</span>
            <div>
              <div class="result-name">${p.name}</div>
              <div class="result-artist">${p.score} point${p.score !== 1 ? 's' : ''}</div>
            </div>
          </div>
        `).join('');

        const trackRows = roundResults.map(r => `
          <div class="result-row">
            <span style="font-size:1.1rem">${r.got_it ? '✅' : '❌'}</span>
            <div>
              <div class="result-name">${r.name}</div>
              <div class="result-artist">${r.artist}${r.scorer ? ` · ${r.scorer}` : ''}</div>
            </div>
          </div>
        `).join('');

        document.getElementById('final-track-list').innerHTML =
          playerRows + '<div class="divider"></div>' + trackRows;
      }
    }

    document.getElementById('btn-restart').addEventListener('click', () => showScreen('setup'));

    // ── Helpers ───────────────────────────────────────────────────────────────
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = '⚠ ' + msg;
      el.style.display = 'block';
    }

    init();
  </script>
</body>
</html>
